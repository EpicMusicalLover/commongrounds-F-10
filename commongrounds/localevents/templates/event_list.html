{% block content %}
<h1>Local Events</h1>

<h2>Event List</h2>

<ul>
    {% for event in event_list %}
        <li>
            <a href="{% url 'localevents:event-detail' event.pk %}">{{ event.title }}</a>
        </li>
    {% empty %}
        <li>No events are available. Please add events.</li>
    {% endfor %}
</ul>
{% endblock %}
