{% block content %}
    <h1>Book Club</h1>
    
    <h2>{{ book.title }}</h2>

    <p><strong>Author:</strong> {{ book.author }}</p>
    <p><strong>Genre:</strong> {{ book.genre }}</p>
    <p><strong>Published:</strong> {{ book.publication_year }}</p>

    <hr>
    <p><strong>Created On:</strong> {{ book.created_on }}</p>
    <p><strong>Updated On:</strong> {{ book.updated_on }}</p>
    <a href="{% url 'bookclub:book_list' %}">Back to Book List</a>

{% endblock %}
